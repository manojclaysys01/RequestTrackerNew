              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                  <TextView android:text="Overview" android:textSize="22sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginBottom="16dp"/>
                  <GridLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:columnCount="2" android:layout_marginBottom="16dp">
                      <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1" android:layout_margin="4dp" app:cardCornerRadius="8dp">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp" android:gravity="center">
                              <TextView android:id="@+id/text_total_value" android:text="0" android:textSize="32sp" android:textStyle="bold" android:textColor="?colorPrimary" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                              <TextView android:text="Total" android:textSize="12sp" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                          </LinearLayout>
                      </com.google.android.material.card.MaterialCardView>
                      <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1" android:layout_margin="4dp" app:cardCornerRadius="8dp">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp" android:gravity="center">
                              <TextView android:id="@+id/text_success_value" android:text="0" android:textSize="32sp" android:textStyle="bold" android:textColor="#4CAF50" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                              <TextView android:text="Success" android:textSize="12sp" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                          </LinearLayout>
                      </com.google.android.material.card.MaterialCardView>
                      <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1" android:layout_margin="4dp" app:cardCornerRadius="8dp">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp" android:gravity="center">
                              <TextView android:id="@+id/text_error_value" android:text="0" android:textSize="32sp" android:textStyle="bold" android:textColor="#F44336" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                              <TextView android:text="Errors" android:textSize="12sp" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                          </LinearLayout>
                      </com.google.android.material.card.MaterialCardView>
                      <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1" android:layout_margin="4dp" app:cardCornerRadius="8dp">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp" android:gravity="center">
                              <TextView android:id="@+id/text_avg_value" android:text="—" android:textSize="28sp" android:textStyle="bold" android:textColor="?colorSecondary" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                              <TextView android:text="Avg Duration" android:textSize="12sp" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
                          </LinearLayout>
                      </com.google.android.material.card.MaterialCardView>
                  </GridLayout>
                  <com.google.android.material.card.MaterialCardView android:layout_width="match_parent" android:layout_height="wrap_content" app:cardCornerRadius="8dp" android:layout_marginBottom="16dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                          <TextView android:id="@+id/text_error_rate" android:text="Error Rate: 0%" android:textStyle="bold" android:textSize="14sp" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginBottom="8dp"/>
                          <ProgressBar android:id="@+id/progress_error_rate" style="@style/Widget.AppCompat.ProgressBar.Horizontal" android:layout_width="match_parent" android:layout_height="8dp" android:progress="0" android:max="100"/>
                      </LinearLayout>
                  </com.google.android.material.card.MaterialCardView>
                  <TextView android:text="Recent Requests" android:textSize="16sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginBottom="8dp"/>
                  <androidx.recyclerview.widget.RecyclerView android:id="@+id/recycler_recent" android:layout_width="match_parent" android:layout_height="wrap_content" android:nestedScrollingEnabled="false"/>
              </LinearLayout>
          </androidx.core.widget.NestedScrollView>
          EOF
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cat > app/src/main/res/mipmap-$dpi/ic_launcher.xml << 'ICON'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/purple_500"/>
              <foreground android:drawable="@drawable/ic_monitor"/>
          </adaptive-icon>
          ICON
            cp app/src/main/res/mipmap-$dpi/ic_launcher.xml app/src/main/res/mipmap-$dpi/ic_launcher_round.xml
          done
          echo "All files generated!"
      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RequestTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: "RequestTracker APK — ${{ steps.date.outputs.date }}"
          body: |
            ## 📱 RequestTracker APK - Ready to Install!
            1. Tap app-debug.apk below to download
            2. Open from your Files app
            3. Tap Install ✅
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
