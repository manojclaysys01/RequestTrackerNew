          cat > $SRC/util/ExportUtil.kt << 'EOF'
          package com.requesttracker.util
          import android.content.Context; import android.content.Intent; import android.net.Uri
          import androidx.core.content.FileProvider; import com.google.gson.GsonBuilder
          import com.requesttracker.data.model.RequestLog
          import java.io.File; import java.io.FileWriter; import java.text.SimpleDateFormat; import java.util.*
          object ExportUtil {
              private val df = SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss", Locale.US)
              private val gson = GsonBuilder().setPrettyPrinting().create()
              fun json(ctx: Context, logs: List<RequestLog>): Uri {
                  val f = File(ctx.cacheDir, "logs_${System.currentTimeMillis()}.json").apply { writeText(gson.toJson(logs)) }
                  return FileProvider.getUriForFile(ctx, "${ctx.packageName}.fileprovider", f)
              }
              fun csv(ctx: Context, logs: List<RequestLog>): Uri {
                  val f = File(ctx.cacheDir, "logs_${System.currentTimeMillis()}.csv")
                  FileWriter(f).use { w -> w.appendLine("ID,Time,Type,Method,URL,Status,Code,DurationMs,Error")
                      logs.forEach { w.appendLine("${it.id},${df.format(Date(it.timestamp))},${it.type},${it.method},\"${it.url}\",${it.status},${it.responseCode?:""},${it.durationMs?:""},\"${it.errorMessage?:""}\"") }
                  }
                  return FileProvider.getUriForFile(ctx, "${ctx.packageName}.fileprovider", f)
              }
              fun share(ctx: Context, uri: Uri, mime: String) = ctx.startActivity(Intent.createChooser(
                  Intent(Intent.ACTION_SEND).apply { type = mime; putExtra(Intent.EXTRA_STREAM, uri); addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION) }, "Export"))
          }
          EOF
